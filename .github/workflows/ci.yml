name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-regression:
    # Matrix: test trên cả Ubuntu (nhanh/rẻ) lẫn Windows (platform target thực tế)
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false  # Chạy hết cả 2 dù 1 cái fail, để biết lỗi riêng từng OS

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint .

      - name: Build web bundle
        run: npm run build

      - name: Run regression suite with coverage
        run: node --experimental-test-coverage tests/regression/run-all.mjs

      - name: Upload dist artifact
        if: success() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist
          if-no-files-found: error
