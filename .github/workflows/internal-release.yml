name: Internal release bundle

on:
  workflow_dispatch:
    inputs:
      bundle_name:
        description: "Bundle folder name under internal-release/"
        required: false
        default: "github-actions-bundle"
      include_release_dir:
        description: "Also try packaging Electron release/ output (best effort; Linux runners may skip Windows installer)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  internal-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build

      - name: Run regression suite
        run: npm run test:regression

      - name: Prepare internal release bundle
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_ROOT="internal-release/${{ inputs.bundle_name }}"
          mkdir -p "$BUNDLE_ROOT"

          cp -R dist "$BUNDLE_ROOT/dist"
          cp -R docs/release "$BUNDLE_ROOT/docs-release"

          if [ -d internal-release/first-bundle ]; then
            cp -R internal-release/first-bundle "$BUNDLE_ROOT/first-bundle"
          fi

          if [ -d internal-release/second-bundle ]; then
            cp -R internal-release/second-bundle "$BUNDLE_ROOT/second-bundle"
          fi

          cat > "$BUNDLE_ROOT/README.txt" <<'EOF'
          Internal release bundle generated by GitHub Actions.

          Included by default:
          - dist/ production web build
          - docs-release/ handoff + internal release checklists
          - any checked-in internal-release demo bundles already present in the repo

          Before handing this to another person, confirm:
          1. build + regression passed in the workflow run
          2. the snapshot/result JSON pair you share came from the same reviewed app state
          3. wording remains internal-only, not external certification
          EOF

      - name: Package Electron release output (best effort)
        if: ${{ inputs.include_release_dir }}
        continue-on-error: true
        run: npm run dist -- --publish=never

      - name: Copy release directory if present
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_ROOT="internal-release/${{ inputs.bundle_name }}"
          if [ -d release ]; then
            cp -R release "$BUNDLE_ROOT/release"
          fi

      - name: Upload internal release bundle
        uses: actions/upload-artifact@v4
        with:
          name: internal-release-${{ inputs.bundle_name }}
          path: internal-release/${{ inputs.bundle_name }}
          if-no-files-found: error
